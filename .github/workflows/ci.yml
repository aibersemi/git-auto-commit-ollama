name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bash:
    name: Bash validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check Bash syntax
        run: bash -n git-ai.sh

      - name: Run ShellCheck
        run: shellcheck git-ai.sh

      - name: Check help output
        run: ./git-ai.sh --help >/tmp/git-ai-help.txt
