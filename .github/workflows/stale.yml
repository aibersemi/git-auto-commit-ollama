name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '30 1 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          stale-issue-message: 'Issue ini telah ditandai sebagai kedaluwarsa (stale) karena tidak ada aktivitas selama 60 hari. Jika masalah ini masih relevan, silakan tinggalkan komentar. Jika tidak, issue ini akan ditutup dalam 7 hari.'
          stale-pr-message: 'Pull Request ini telah ditandai sebagai kedaluwarsa karena tidak ada pembaruan selama 60 hari. Harap berikan pembaruan atau PR ini akan ditutup otomatis.'
          days-before-stale: 60
          days-before-close: 7
          exempt-issue-labels: 'bug,enhancement,security'
