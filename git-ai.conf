# git-ai.conf - Konfigurasi Git AI Commit Assistant
# -------------------------------------------------
# File ini berada satu folder dengan git-ai.sh dan menjadi sumber utama
# nilai default runtime. Jangan simpan secret di sini.

# Model dan host Ollama
DEFAULT_MODEL="gemma4:e4b"
DEFAULT_OLLAMA_HOST="http://localhost:11434"
FALLBACK_OLLAMA_HOST="http://10.50.0.2:11434"
OLLAMA_HOST=""

# Opsi request Ollama
OLLAMA_TEMPERATURE="0.2"
OLLAMA_THINK="false"
OLLAMA_KEEP_ALIVE=""
OLLAMA_NUM_CTX=""
OLLAMA_NUM_PARALLEL=""
OLLAMA_NUM_PREDICT="2048"
OLLAMA_MAX_NUM_PREDICT="2048"

# Analisis per-file
FILE_ANALYSIS_LIMIT="6"
FILE_ANALYSIS_PARALLELISM="4"
FILE_ANALYSIS_NUM_PREDICT_PER_FILE="512"

# Tuning prompt/context
MAX_FILES_LIST="20"
TOP_FILES="4"
MAX_HUNK_CHARS="1000"
MAX_TOTAL_HUNKS_CHARS="3500"
